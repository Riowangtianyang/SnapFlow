<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapFlow 设计预览</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1D4ED8;
      --primary-hover: #1E40AF;
      --primary-light: #DBEAFE;
      --surface: #FFFFFF;
      --bg: #F8FAFC;
      --border: #E2E8F0;
      --border-subtle: #F1F5F9;
      --text: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --success: #059669;
      --success-bg: #ECFDF5;
      --warning: #D97706;
      --warning-bg: #FFFBEB;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .page-wrapper {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(29, 78, 216, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(5, 150, 105, 0.02) 0%, transparent 50%),
        var(--bg);
    }

    /* 顶部导航 */
    .topbar {
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, #3B82F6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 2px 8px rgba(29, 78, 216, 0.3);
    }

    /* 导航按钮组 */
    .nav-group {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      height: 38px;
      padding: 0 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s ease;
    }

    .nav-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* 搜索框 - 右侧 */
    .topbar-search {
      margin-left: auto;
      position: relative;
      width: 240px;
    }

    .topbar-search input {
      width: 100%;
      height: 38px;
      padding: 0 16px 0 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
      transition: all 0.15s ease;
    }

    .topbar-search input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .topbar-search input::placeholder {
      color: var(--text-muted);
    }

    .topbar-search .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* 头像和设置 */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 设置按钮 */
    .settings-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .settings-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 设置弹出卡片 */
    .settings-dropdown {
      position: absolute;
      top: 100%;
      right: 140px;
      margin-top: 8px;
      width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
      padding: 8px;
      z-index: 200;
      display: none;
    }

    .settings-dropdown.show {
      display: block;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .settings-item:hover {
      background: var(--bg);
      color: var(--text);
    }

    .settings-item.danger {
      color: #DC2626;
    }

    .settings-item.danger:hover {
      background: #FEF2F2;
    }

    /* 头像 */
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .avatar:hover {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
    }

    /* 主内容区 */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    /* 页面标题 */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-family: 'IBM Plex Serif', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* 工作流网格 */
    .workflow-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* 工作流卡片 */
    .workflow-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .workflow-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary) 0%, #60A5FA 100%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .workflow-card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    .workflow-card:hover::before {
      opacity: 1;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .card-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
    }

    .card-stats {
      display: flex;
      gap: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .card-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-active {
      background: var(--success-bg);
      color: var(--success);
    }

    .status-draft {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* 节点类型标签 */
    .node-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .node-tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tag-click { background: #DBEAFE; color: #1D4ED8; }
    .tag-extract { background: #F3E8FF; color: #7C3AED; }
    .tag-download { background: #FEF3C7; color: #D97706; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      margin: 0 auto 16px;
    }

    .empty-title {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .btn-secondary {
      height: 40px;
      padding: 0 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s ease;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- 顶部导航 -->
    <header class="topbar">
      <div class="logo">
        <div class="logo-icon">
          <i data-lucide="workflow" style="width: 20px; height: 20px"></i>
        </div>
        SnapFlow
      </div>

      <div class="nav-group">
        <button class="nav-btn active">
          <i data-lucide="git-branch" style="width: 18px; height: 18px"></i>
          工作流
        </button>
        <button class="nav-btn">
          <i data-lucide="layout-dashboard" style="width: 18px; height: 18px"></i>
          仪表盘
        </button>
      </div>

      <div class="topbar-search">
        <i data-lucide="search" class="search-icon" style="width: 16px; height: 16px"></i>
        <input type="text" placeholder="搜索工作流...">
      </div>

      <div class="topbar-right">
        <button class="settings-btn" onclick="toggleSettings()">
          <i data-lucide="settings" style="width: 18px; height: 18px"></i>
        </button>
        <div class="settings-dropdown" id="settingsDropdown">
          <div class="settings-item">
            <i data-lucide="user" style="width: 16px; height: 16px"></i>
            个人信息
          </div>
          <div class="settings-item">
            <i data-lucide="bell" style="width: 16px; height: 16px"></i>
            通知设置
          </div>
          <div class="settings-item">
            <i data-lucide="help-circle" style="width: 16px; height: 16px"></i>
            帮助中心
          </div>
          <div class="settings-item danger">
            <i data-lucide="log-out" style="width: 16px; height: 16px"></i>
            退出登录
          </div>
        </div>
        <div class="avatar">W</div>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1 class="page-title">工作流</h1>
        <p class="page-subtitle">管理和自动化您的数据采集流程</p>
      </div>

      <!-- 工作流列表 -->
      <div class="workflow-grid">
        <!-- 空状态卡片 - 固定在第一位 -->
        <div class="empty-state">
          <div class="empty-icon">
            <i data-lucide="plus-circle" style="width: 32px; height: 32px"></i>
          </div>
          <div class="empty-title">创建第一个工作流</div>
          <div class="empty-desc">通过简单的可视化编辑器，快速构建自动化采集流程</div>
          <button class="btn-secondary">
            <i data-lucide="plus" style="width: 16px; height: 16px"></i>
            新建工作流
          </button>
        </div>

        <!-- 卡片 1 -->
        <div class="workflow-card">
          <div class="card-header">
            <div>
              <div class="card-title">竞品价格监控</div>
              <div class="card-meta">最后更新: 10 分钟前</div>
            </div>
            <div class="card-icon">
              <i data-lucide="eye" style="width: 22px; height: 22px"></i>
            </div>
          </div>
          <div class="card-description">每日定时抓取主要竞品官网价格数据，自动整理成Excel报表</div>
          <div class="node-tags">
            <span class="node-tag tag-click">
              <i data-lucide="mouse-pointer-click" style="width: 12px; height: 12px"></i>
              点击
            </span>
            <span class="node-tag tag-extract">
              <i data-lucide="file-text" style="width: 12px; height: 12px"></i>
              提取
            </span>
            <span class="node-tag tag-download">
              <i data-lucide="download" style="width: 12px; height: 12px"></i>
              下载
            </span>
          </div>
          <div class="card-footer">
            <div class="card-stats">
              <span class="stat">
                <i data-lucide="git-branch" style="width: 14px; height: 14px"></i>
                3 节点
              </span>
              <span class="stat">
                <i data-lucide="clock" style="width: 14px; height: 14px"></i>
                2min/次
              </span>
            </div>
            <div class="card-status status-active">
              <span class="status-dot"></span>
              运行中
            </div>
          </div>
        </div>

        <!-- 卡片 2 -->
        <div class="workflow-card">
          <div class="card-header">
            <div>
              <div class="card-title">用户评论采集</div>
              <div class="card-meta">最后更新: 1 小时前</div>
            </div>
            <div class="card-icon">
              <i data-lucide="message-square" style="width: 22px; height: 22px"></i>
            </div>
          </div>
          <div class="card-description">从多个电商平台采集用户评论，情感分析后汇总展示</div>
          <div class="node-tags">
            <span class="node-tag tag-click">
              <i data-lucide="mouse-pointer-click" style="width: 12px; height: 12px"></i>
              点击
            </span>
            <span class="node-tag tag-extract">
              <i data-lucide="file-text" style="width: 12px; height: 12px"></i>
              提取
            </span>
          </div>
          <div class="card-footer">
            <div class="card-stats">
              <span class="stat">
                <i data-lucide="git-branch" style="width: 14px; height: 14px"></i>
                2 节点
              </span>
              <span class="stat">
                <i data-lucide="clock" style="width: 14px; height: 14px"></i>
                5min/次
              </span>
            </div>
            <div class="card-status status-draft">
              <span class="status-dot"></span>
              草稿
            </div>
          </div>
        </div>

        <!-- 卡片 3 -->
        <div class="workflow-card">
          <div class="card-header">
            <div>
              <div class="card-title">官网内容备份</div>
              <div class="card-meta">最后更新: 昨天</div>
            </div>
            <div class="card-icon">
              <i data-lucide="archive" style="width: 22px; height: 22px"></i>
            </div>
          </div>
          <div class="card-description">定期备份目标网站页面内容和截图，留存重要信息</div>
          <div class="node-tags">
            <span class="node-tag tag-click">
              <i data-lucide="mouse-pointer-click" style="width: 12px; height: 12px"></i>
              点击
            </span>
            <span class="node-tag tag-download">
              <i data-lucide="download" style="width: 12px; height: 12px"></i>
              下载
            </span>
          </div>
          <div class="card-footer">
            <div class="card-stats">
              <span class="stat">
                <i data-lucide="git-branch" style="width: 14px; height: 14px"></i>
                2 节点
              </span>
              <span class="stat">
                <i data-lucide="clock" style="width: 14px; height: 14px"></i>
                1h/次
              </span>
            </div>
            <div class="card-status status-active">
              <span class="status-dot"></span>
              运行中
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();

    function toggleSettings() {
      const dropdown = document.getElementById('settingsDropdown');
      dropdown.classList.toggle('show');
    }

    document.addEventListener('click', function(e) {
      const dropdown = document.getElementById('settingsDropdown');
      const settingsBtn = e.target.closest('.settings-btn');
      if (!settingsBtn && dropdown.classList.contains('show')) {
        dropdown.classList.remove('show');
      }
    });
  </script>
</body>
</html>
